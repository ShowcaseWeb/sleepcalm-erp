version: '3.9'

services:
  # =============================================
  # PostgreSQL Database
  # =============================================
  postgres:
    image: postgres:16-alpine
    container_name: sleepcalm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sleepcalm_erp
      POSTGRES_USER: sleepcalm_admin
      POSTGRES_PASSWORD: SleepcAlm@2024#Secure!
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sleepcalm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sleepcalm_admin -d sleepcalm_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Redis Cache
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: sleepcalm-redis
    restart: unless-stopped
    command: redis-server --requirepass SleepcalmRedis@2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sleepcalm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Backend API (Node.js + Express)
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sleepcalm-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://sleepcalm_admin:SleepcAlm@2024#Secure!@postgres:5432/sleepcalm_erp
      REDIS_URL: redis://:SleepcalmRedis@2024@redis:6379
      JWT_SECRET: JWT_ULTRA_SECRET_SLEEPCALM_2024_PRODUCTION_KEY_CHANGE_THIS
      JWT_EXPIRES_IN: 8h
      JWT_REFRESH_SECRET: JWT_REFRESH_ULTRA_SECRET_SLEEPCALM_2024
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      UPLOAD_MAX_SIZE: 50mb
      BCRYPT_ROUNDS: 12
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/reports/generated:/app/reports/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sleepcalm-network

  # =============================================
  # Frontend (Next.js)
  # =============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sleepcalm-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_APP_NAME: SleepCalm ERP
      NEXT_PUBLIC_APP_VERSION: 1.0.0
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sleepcalm-network

  # =============================================
  # Nginx Reverse Proxy
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: sleepcalm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - sleepcalm-network

networks:
  sleepcalm-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
